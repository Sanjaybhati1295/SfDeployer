<!DOCTYPE html>
<html>
<head>
  <title>SF Deployer – Auth Relay</title>
  <style>
    body { font-family: sans-serif; background: #0d1117; color: #e6edf3;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; flex-direction: column; gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #21262d;
               border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #8b949e; font-size: 14px; margin: 0; text-align: center; line-height: 1.6; }
    .success { color: #3fb950; font-size: 15px; font-weight: 600; }
    .error { color: #f85149; font-size: 14px; }
    pre { font-size: 10px; color: #58a6ff; word-break: break-all; max-width: 500px;
          padding: 10px; background: #161b22; border-radius: 6px; border: 1px solid #30363d; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="message">Completing authentication...</p>
  <script>
    const params = new URLSearchParams(
      window.location.hash.substring(1) || window.location.search.substring(1)
    );
    const accessToken = params.get('access_token');
    const instanceUrl = params.get('instance_url');
    const error = params.get('error');

    if (error) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('message').className = 'error';
      document.getElementById('message').textContent = params.get('error_description') || error;
    } else if (accessToken) {
      // Pass token back to extension window that opened this tab
      if (window.opener) {
        window.opener.postMessage({
          type: 'SF_DEPLOYER_OAUTH_CALLBACK',
          accessToken,
          instanceUrl: instanceUrl ? decodeURIComponent(instanceUrl) : ''
        }, '*');
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').className = 'success';
        document.getElementById('message').textContent = '✓ Connected! You can close this tab.';
        setTimeout(() => window.close(), 1500);
      } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').innerHTML =
          'Authentication complete!<br>Copy the full URL below and paste it in the extension:';
        const pre = document.createElement('pre');
        pre.textContent = window.location.href;
        document.body.appendChild(pre);
      }
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('message').textContent = 'No token found. Please try again.';
    }
  </script>
</body>
</html>
